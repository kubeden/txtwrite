name: "Release: Deploy And Cleanup"

on:
  pull_request_target:
    types: [closed]
    branches: [feat/neon-backend]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to release or clean up
        required: true
      merged:
        description: Run the production deploy path before cleanup
        required: true
        default: "true"
      merge_sha:
        description: Optional merge commit SHA to record in the rollout annotation
        required: false

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    concurrency:
      group: close-${{ github.event.pull_request.number || inputs.pr_number }}
      cancel-in-progress: false
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v5
        with:
          ref: feat/neon-backend

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup Deno
        if: github.event.pull_request.merged == true || inputs.merged == 'true'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Docker Buildx
        if: github.event.pull_request.merged == true || inputs.merged == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Say production deploy is starting
        if: github.event.pull_request.merged == true || inputs.merged == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: node scripts/agent-status.mjs --stage productionStarted

      - name: Run production migration
        if: github.event.pull_request.merged == true || inputs.merged == 'true'
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          node scripts/run-configured-command.mjs install
          node scripts/run-configured-command.mjs migrate

      - name: Checkout GitOps repository
        uses: actions/checkout@v5
        with:
          repository: kubeden/kubeden
          token: ${{ secrets.GITOPS_TOKEN }}
          path: .agent/runtime/gitops
          fetch-depth: 0

      - name: Deploy production
        id: production
        if: github.event.pull_request.merged == true || inputs.merged == 'true'
        env:
          PROD_VITE_NEON_AUTH_URL: ${{ secrets.PROD_VITE_NEON_AUTH_URL }}
          PROD_VITE_NEON_DATA_API_URL: ${{ secrets.PROD_VITE_NEON_DATA_API_URL }}
          PR_MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha || inputs.merge_sha }}
          ZOT_REGISTRY_USERNAME: ${{ secrets.ZOT_REGISTRY_USERNAME }}
          ZOT_REGISTRY_PASSWORD: ${{ secrets.ZOT_REGISTRY_PASSWORD }}
        run: node scripts/deploy-production-gitops.mjs

      - name: Say cleanup is starting
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: node scripts/agent-status.mjs --stage previewCleanup

      - name: Delete Neon preview branch
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: node scripts/neon-preview.mjs delete

      - name: Cleanup GitOps preview
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: node scripts/run-configured-command.mjs cleanup

      - name: Comment cleanup result
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          if [ "${{ github.event.pull_request.merged == true || inputs.merged == 'true' }}" = "true" ]; then
            body="Merged and deployed.

          Production: ${{ steps.production.outputs.production_url }}
          Image: \`${{ steps.production.outputs.image }}\`
          Trace image: \`${{ steps.production.outputs.trace_image }}\`
          GitOps commit: \`${{ steps.production.outputs.gitops_commit }}\`

          "
          else
            body="Cleanup is done.

          "
          fi

          if [ "${{ steps.neon.outputs.deleted }}" = "true" ]; then
            body="${body}I deleted the Neon preview branch \`${{ steps.neon.outputs.branch_name }}\` and removed the GitOps preview manifests."
          else
            body="${body}I removed the GitOps preview manifests. Neon did not delete a branch: ${{ steps.neon.outputs.reason }}"
          fi

          gh pr comment "$PR_NUMBER" --body "$body"
